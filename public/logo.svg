<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Icon: surprise box with BB inside -->
  <g transform="translate(4 4)">
    <!-- Main box body -->
    <rect x="6" y="32" width="60" height="38" rx="4" fill="#FF2D78" stroke="#1A1A2E" stroke-width="3"/>
    <!-- Horizontal band (box seam) -->
    <rect x="6" y="46" width="60" height="4" fill="#1A1A2E"/>
    <!-- Lid (popped open, tilted) -->
    <g transform="rotate(-6 36 22)">
      <rect x="2" y="14" width="68" height="14" rx="3" fill="#04BEFE" stroke="#1A1A2E" stroke-width="3"/>
    </g>
    <!-- BB letters on box -->
    <text x="36" y="65" text-anchor="middle" font-family="Arial Black, -apple-system, sans-serif" font-size="20" font-weight="900" fill="white" letter-spacing="-1">BB</text>
    <!-- Sparkle top right -->
    <path d="M66 4 L69 -1 L72 4 L77 7 L72 10 L69 15 L66 10 L61 7 Z" fill="#FFE600" stroke="#1A1A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Sparkle top left -->
    <circle cx="4" cy="8" r="2.5" fill="#FFE600" stroke="#1A1A2E" stroke-width="1.2"/>
  </g>
  <!-- Wordmark "Boost Boss" -->
  <text x="92" y="54" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="32" font-weight="700" fill="#1A1A2E" letter-spacing="-1.5">Boost Boss</text>
</svg>
