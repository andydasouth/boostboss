<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Main box body -->
  <rect x="10" y="36" width="60" height="38" rx="5" fill="#FF2D78" stroke="#1A1A2E" stroke-width="3.5"/>
  <!-- Horizontal band (box seam) -->
  <rect x="10" y="50" width="60" height="4" fill="#1A1A2E"/>
  <!-- Lid (popped open, tilted) -->
  <g transform="rotate(-6 40 26)">
    <rect x="6" y="18" width="68" height="14" rx="3" fill="#04BEFE" stroke="#1A1A2E" stroke-width="3.5"/>
  </g>
  <!-- BB letters on box -->
  <text x="40" y="69" text-anchor="middle" font-family="Arial Black, -apple-system, sans-serif" font-size="20" font-weight="900" fill="white" letter-spacing="-1">BB</text>
  <!-- Sparkle -->
  <path d="M72 8 L74.5 3 L77 8 L82 10.5 L77 13 L74.5 18 L72 13 L67 10.5 Z" fill="#FFE600" stroke="#1A1A2E" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
