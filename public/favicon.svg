<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Sparkle signature at top-right (retained motion mark) -->
  <path d="M 66 8 L 68.5 3 L 71 8 L 76 10.5 L 71 13 L 68.5 18 L 66 13 L 61 10.5 Z"
        fill="#FFE600" stroke="#1A1A2E" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Speed lines (motion trail) -->
  <line x1="14" y1="28" x2="24" y2="28" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"/>
  <line x1="8"  y1="40" x2="24" y2="40" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="52" x2="24" y2="52" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round"/>

  <!-- Left fin -->
  <path d="M 30 50 L 21 67 L 32 62 Z"
        fill="#04BEFE" stroke="#1A1A2E" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right fin -->
  <path d="M 52 50 L 61 67 L 50 62 Z"
        fill="#04BEFE" stroke="#1A1A2E" stroke-width="3" stroke-linejoin="round"/>

  <!-- Rocket body (pink rectangle) -->
  <rect x="30" y="26" width="22" height="36"
        fill="#FF2D78" stroke="#1A1A2E" stroke-width="3"/>

  <!-- Nose cone (yellow twist for flavor) -->
  <path d="M 30 26 L 41 7 L 52 26 Z"
        fill="#FFE600" stroke="#1A1A2E" stroke-width="3" stroke-linejoin="round"/>

  <!-- Cockpit window (cyan circle) -->
  <circle cx="41" cy="35" r="5.5" fill="#04BEFE" stroke="#1A1A2E" stroke-width="2.5"/>

  <!-- Body seam -->
  <line x1="30" y1="44" x2="52" y2="44" stroke="#1A1A2E" stroke-width="2"/>

  <!-- BB letters on body (below seam) -->
  <text x="41" y="58" text-anchor="middle"
        font-family="Arial Black, -apple-system, sans-serif"
        font-size="13" font-weight="900" fill="white" letter-spacing="-0.5">BB</text>

  <!-- Flame outer (yellow) -->
  <path d="M 31 62 L 36 77 L 41 66 L 46 77 L 51 62 Z"
        fill="#FFE600" stroke="#1A1A2E" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Flame inner (pink core) -->
  <path d="M 36 62 L 41 72 L 46 62 Z" fill="#FF2D78"/>
</svg>
